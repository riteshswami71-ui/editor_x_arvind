openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Editor X Arvind API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: messages
    description: Contact messages
  - name: items
    description: Portfolio and product items
  - name: categories
    description: Item categories
  - name: stats
    description: Admin statistics
  - name: auth
    description: Admin authentication
  - name: social
    description: Social media links
  - name: jobs
    description: Editor job listings
  - name: storage
    description: File storage

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List all messages (admin only)
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: createMessage
      tags: [messages]
      summary: Send a contact message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/{id}:
    get:
      operationId: getMessage
      tags: [messages]
      summary: Get a single message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "404":
          description: Not found
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /messages/{id}/read:
    patch:
      operationId: markMessageRead
      tags: [messages]
      summary: Mark a message as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List items (portfolio, software, templates, plugins, editor visual)
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
    post:
      operationId: createItem
      tags: [items]
      summary: Create a new item (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

  /items/{id}:
    get:
      operationId: getItem
      tags: [items]
      summary: Get a single item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "404":
          description: Not found
    patch:
      operationId: updateItem
      tags: [items]
      summary: Update an item (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpdate"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete an item (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /social-links:
    get:
      operationId: getSocialLinks
      tags: [social]
      summary: Get social media links
      responses:
        "200":
          description: Social links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialLinks"
    put:
      operationId: updateSocialLinks
      tags: [social]
      summary: Update social media links (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialLinksInput"
      responses:
        "200":
          description: Updated social links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialLinks"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current admin session
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Not authenticated

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List job listings
      parameters:
        - name: activeOnly
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a job listing (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job listing (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job listing (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Message:
      type: object
      required: [id, name, email, subject, message, isRead, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string

    MessageInput:
      type: object
      required: [name, email, subject, message]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        subject:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1

    Item:
      type: object
      required: [id, title, description, category, imageUrl, isFeatured, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        imageUrl:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        downloadUrl:
          type: ["string", "null"]
        fileKey:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        isFeatured:
          type: boolean
        createdAt:
          type: string

    ItemInput:
      type: object
      required: [title, description, category]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        category:
          type: string
        imageUrl:
          type: string
        price:
          type: string
        downloadUrl:
          type: string
        fileKey:
          type: string
        tags:
          type: string
        isFeatured:
          type: boolean

    ItemUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        imageUrl:
          type: string
        price:
          type: string
        downloadUrl:
          type: string
        fileKey:
          type: string
        tags:
          type: string
        isFeatured:
          type: boolean

    Stats:
      type: object
      required: [totalMessages, unreadMessages, totalItems, itemsByCategory]
      properties:
        totalMessages:
          type: integer
        unreadMessages:
          type: integer
        totalItems:
          type: integer
        itemsByCategory:
          type: object
          additionalProperties:
            type: integer

    LoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    LoginResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    AdminUser:
      type: object
      required: [isAdmin]
      properties:
        isAdmin:
          type: boolean

    SocialLinks:
      type: object
      required: [id]
      properties:
        id:
          type: integer
        youtube:
          type: ["string", "null"]
        instagram:
          type: ["string", "null"]
        whatsapp:
          type: ["string", "null"]
        telegram:
          type: ["string", "null"]

    SocialLinksInput:
      type: object
      properties:
        youtube:
          type: string
        instagram:
          type: string
        whatsapp:
          type: string
        telegram:
          type: string

    Job:
      type: object
      required: [id, title, jobType, description, isActive, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        jobType:
          type: string
        description:
          type: string
        requirements:
          type: ["string", "null"]
        budget:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    JobInput:
      type: object
      required: [title, jobType, description]
      properties:
        title:
          type: string
          minLength: 1
        jobType:
          type: string
        description:
          type: string
        requirements:
          type: string
        budget:
          type: string
        isActive:
          type: boolean

    JobUpdate:
      type: object
      properties:
        title:
          type: string
        jobType:
          type: string
        description:
          type: string
        requirements:
          type: string
        budget:
          type: string
        isActive:
          type: boolean

    RequestUploadUrlBody:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    RequestUploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
